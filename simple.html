张笑了笑，没再问。\n他记下了——这个新人不张扬。\n\n（王铁锤在远处听到了你们的对话。）"}, {"type": "msg", "nid": "act1_side_zhao", "author": "王铁锤", "text": "小舟", "time": "10:15"}, {"type": "msg", "nid": "act1_side_zhao", "author": "王铁锤", "text": "过来一下", "time": "10:15"}, {"type": "msg", "nid": "act1_side_zhao", "author": "王铁锤", "text": "我介绍个老员工给你认识", "time": "10:15"}, {"type": "decision", "nid": "act1_side_zhao", "prompt": "老张在套你的话。\n\"小林啊，来多久了？业务熟了吧？\"\n\n你怎么回？", "options": [{"text": "实话实说：刚来 3 天，还在熟悉\n(老张+5，王铁锤+5，人情+3)", "effect": {"human": 3, "npc.王铁锤.trust": 5}}, {"text": "反向试探：张哥您看呢？\n(话术+5，王铁锤-3)", "effect": {"speech": 5, "npc.王铁锤.trust": -3}}, {"text": "模糊应付：还行还行，还在学习哈~🌹\n(乙里乙气+2)", "effect": {"yibeiLevel": 2}}]}, {"type": "narr", "nid": "act1_side_laolin", "text": "你推门进去。\n新来的 95 后 leader 坐在主位。\n他比你小 5 岁。\n\n\"老林，这个方案你看看。\"\n\n你 33 岁。\n第一次被叫\"老\"。"}, {"type": "narr", "nid": "act1_side_laolin", "text": "leader 笑了笑：\"行吧林舟。\"\n但小张 AE 后来悄悄说：\n\"那小子背地里说你不好相处。\""}, {"type": "msg", "nid": "act1_side_laolin", "author": "小张AE", "text": "林哥", "time": "14:30"}, {"type": "msg", "nid": "act1_side_laolin", "author": "小张AE", "text": "新来的 leader 让你过来一下", "time": "14:30"}, {"type": "decision", "nid": "act1_side_laolin", "prompt": "新 95 后 leader：\n\"老林，这个方案你看看。\"\n\n你怎么接？", "options": [{"text": "当面纠正：叫我林舟就行\n(leader 觉得你不好相处)", "effect": {"stress": 5}}, {"text": "默默接受：行，leader\n(话术+3)", "effect": {"speech": 3}}, {"text": "自嘲：老林老林，干啥都行\n(乙里乙气+1)", "effect": {"yibeiLevel": 1}}]}, {"type": "narr", "nid": "act1_choose_zhaoxin", "text": "她没再说什么。\n但你知道——她记下了。\n\n（王铁锤在远处看到了你跟赵欣的寒暄。\n他觉得——这个新人会处关系。+2 信任。）"}, {"type": "msg", "nid": "act1_choose_zhaoxin", "author": "赵欣", "text": "老同事了，照顾一下", "time": "11:01"}, {"type": "msg", "nid": "act1_choose_zhaoxin", "author": "赵欣", "text": "有事找我", "time": "11:01"}, {"type": "decision", "nid": "act1_choose_zhaoxin", "prompt": "上午 11 点。\n\n茶水间遇到赵欣。\n她端着咖啡，微笑看你。\n\"前同事，最近怎样？\"\n\n你们曾经竞争过 P8。", "options": [{"text": "主动寒暄：\"还行，你也来了？\"\n(人情 +3)", "effect": {"human": 3, "npc.赵欣.trust": 5, "npc.王铁锤.trust": 2}}, {"text": "点头微笑，假装没听见\n(业务 +2)", "effect": {"business": 2, "npc.赵欣.trust": -3}}]}, {"type": "narr", "nid": "act2_morning", "text": "你打开 PPT。\n\n第 7 页。\n\n只有一行字：\n[ 产品图占位 ]"}, {"type": "narr", "nid": "act2_morning", "text": "张总已经看过你发的版本。\n他不知道这一页是空的。\n\n还有 3 小时。"}, {"type": "msg", "nid": "act2_morning", "author": "王铁锤", "text": "小舟，下午 2 点跟双鱼科技开会", "time": "10:30"}, {"type": "msg", "nid": "act2_morning", "author": "王铁锤", "text": "你去讲", "time": "10:30"}, {"type": "msg", "nid": "act2_morning", "author": "王铁锤", "text": "PPT 张设计已经做好了", "time": "10:31"}, {"type": "msg", "nid": "act2_morning", "author": "王铁锤", "text": "但第 7 页是产品图", "time": "10:31"}, {"type": "msg", "nid": "act2_morning", "author": "王铁锤", "text": "AE 那边还没补上", "time": "10:31"}, {"type": "msg", "nid": "act2_morning", "author": "王铁锤", "text": "你看一下", "time": "10:32"}, {"type": "narr", "nid": "act2_ppt_decide", "text": "3 小时后，你拿到了图。\n但张设计的黑眼圈 +1。"}, {"type": "msg", "nid": "act2_ppt_decide", "author": "张设计", "text": "3 小时？", "time": "10:33"}, {"type": "msg", "nid": "act2_ppt_decide", "author": "张设计", "text": "行，我熬一熬", "time": "10:33"}, {"type": "msg", "nid": "act2_ppt_decide", "author": "张设计", "text": "……", "time": "10:33"}, {"type": "decision", "nid": "act2_ppt_decide", "prompt": "PPT 第 7 页是空的。\n3 小时后提案。\n\n你怎么办？", "options": [{"text": "联系张设计，让他 3 小时赶一张图\n(人情 +5，张设计熬夜)", "effect": {"stress": 10}}, {"text": "改 PPT 结构，把这页删了重讲\n(话术 +8，逻辑更好)", "effect": {"human": 5, "npc.张设计.trust": 5, "stress": 15}}, {"text": "临场发挥：'这页我们重点谈策略'\n(话术 +10，靠运气)", "effect": {"speech": 8}}]}, {"type": "msg", "nid": "act2_meeting", "author": "张总", "text": "林舟是吧？", "time": "14:01"}, {"type": "msg", "nid": "act2_meeting", "author": "张总", "text": "我时间宝贵，15 分钟", "time": "14:01"}, {"type": "msg", "nid": "act2_meeting", "author": "张总", "text": "开始吧", "time": "14:01"}, {"type": "narr", "nid": "act2_color_decide", "text": "你回复得很快。\n但张总微微皱眉。\n他觉得——你没想法。"}, {"type": "msg", "nid": "act2_color_decide", "author": "张总", "text": "嗯", "time": "14:14"}, {"type": "msg", "nid": "act2_color_decide", "author": "张总", "text": "行吧", "time": "14:14"}, {"type": "decision", "nid": "act2_color_decide", "prompt": "五彩斑斓的黑。\n量子力学级别。\n\n张总看着你，等你回话。\n\n你怎么回？", "options": [{"text": "好的好的张总，3 版这就安排~🌹\n(业务 +1，乙里乙气 +1)", "effect": {"business": 1, "yibeiLevel": 1}}, {"text": "张总，黑配什么场景？\n能发个参考图吗？\n(话术 +8)", "effect": {"speech": 8}}]}, {"type": "narr", "nid": "act2_side_ppt_silent", "text": "全场安静。\n张总盯着你。\n薛琳（助理）看了你一眼。"}, {"type": "narr", "nid": "act2_side_ppt_silent", "text": "张总没再追问。\n但你看到他在记本子。\n他记下了。"}, {"type": "msg", "nid": "act2_side_ppt_silent", "author": "张总", "text": "等下", "time": "14:08"}, {"type": "msg", "nid": "act2_side_ppt_silent", "author": "张总", "text": "这一页", "time": "14:08"}, {"type": "msg", "nid": "act2_side_ppt_silent", "author": "张总", "text": "图呢？", "time": "14:08"}, {"type": "msg", "nid": "act2_side_ppt_silent", "author": "张总", "text": "行", "time": "14:09"}, {"type": "msg", "nid": "act2_side_ppt_silent", "author": "张总", "text": "下一项", "time": "14:09"}, {"type": "decision", "nid": "act2_side_ppt_silent", "prompt": "张总：\n\"这一页图呢？\"\n\n你怎么办？", "options": [{"text": "这页我们重点谈策略\n(话术+5)", "effect": {"speech": 5}}, {"text": "抱歉，这页方案调整了\n(话术+3)", "effect": {"speech": 3, "stress": 10}}, {"text": "现场用 iPad 画一下\n(业务+5)", "effect": {"business": 5, "stress": 8}}]}, {"type": "narr", "nid": "act3_late_night", "text": "你躺在床上。\n盯着天花板。\n第 8 天。"}, {"type": "notif", "nid": "act3_late_night", "author": "张总", "text": "方案不错，但整体感觉不对。我们再聊聊？"}, {"type": "notif", "nid": "act3_late_night", "author": "张总", "text": "你明天上午有空吗？想跟你通个电话"}, {"type": "notif", "nid": "act3_late_night", "author": "张总", "text": "刚才想了一下，我们再聊个 30 分钟？方便吗？"}, {"type": "narr", "nid": "act3_late_night", "text": "8 天前你提的方案，已经改了 11 版。\n现在他要你\"再聊聊\"。\n\n你的手机还在亮。"}, {"type": "image", "nid": "act3_late_night", "text": "一张工位照片\n散落的咖啡杯、眼药水、披着羽绒服的设计师"}, {"type": "msg", "nid": "act3_late_night", "author": "张设计", "text": "舟哥", "time": "1:25"}, {"type": "msg", "nid": "act3_late_night", "author": "张设计", "text": "你看到张总发的了吗", "time": "1:25"}, {"type": "msg", "nid": "act3_late_night", "author": "张设计", "text": "我已经把第 11 版的源文件打包了", "time": "1:25"}, {"type": "msg", "nid": "act3_late_night", "author": "张设计", "text": "你要是改不动，就用这个发他", "time": "1:26"}, {"type": "msg", "nid": "act3_late_night", "author": "张设计", "text": "反正他最后也会用第一版", "time": "1:26"}, {"type": "msg", "nid": "act3_late_night", "author": "张设计", "text": "舟哥", "time": "1:28"}, {"type": "msg", "nid": "act3_late_night", "author": "张设计", "text": "我们这个工作，是不是有什么问题", "time": "1:28"}, {"type": "msg", "nid": "act3_late_night", "author": "张设计", "text": "我怎么感觉一直在兜圈子", "time": "1:28"}, {"type": "narr", "nid": "act3_side_girlfriend", "text": "你凌晨 1 点到家。\n她没睡。\n\n\"你天天这么晚，是不是不爱我了？\"\n\n你知道——你只是想把方案改完。\n但她知道的是——\n你已经 8 天没陪她吃饭了。"}, {"type": "narr", "nid": "act3_side_girlfriend", "text": "你解释了一通。\n她没说话。\n她去睡了。\n\n你的方案改完了。\n但她的心——可能也睡了。"}, {"type": "decision", "nid": "act3_side_girlfriend", "prompt": "凌晨 1 点。\n女朋友问：\"你天天这么晚，是不是不爱我了？\"\n\n你怎么回？", "options": [{"text": "我也想早回，这单子真走不开\n(抗压+5)", "effect": {"stress": 5}}, {"text": "你想多了，就是工作\n(抗压+10，人情-5)", "effect": {"stress": 10, "human": -5}}, {"text": "抱住她：对不起，等这阵子过了我补偿你\n(人情+3，stress-3)", "effect": {"human": 3, "stress": -3}}]}, {"type": "narr", "nid": "act3_choose", "text": "你没回。\n张设计的消息还挂在那里。\n你翻了个身。\n明天再说。"}, {"type": "decision", "nid": "act3_choose", "prompt": "凌晨 1:23。\n\n你躺在床上，盯着天花板。\n8 天改了 11 版。现在还要\"再聊聊\"。\n张设计在你身后发来消息。\n\n你怎么回？", "options": [{"text": "已读不回。明天再说。\n(抗压 -10，业务 -5)", "effect": {"stress": 10, "business": -5}}, {"text": "回他：\"明天 10 点我们对一下方向\"\n(人情 +5，张设计信任 +8)", "effect": {"human": 5, "npc.张设计.trust": 8, "stress": -5}}, {"text": "回他：\"收到~明天我们对一下哈🌹\"\n(乙里乙气 +2)", "effect": {"yibeiLevel": 2}}]}, {"type": "narr", "nid": "act4_meal", "text": "王铁锤叫你去陪客户刘老板吃饭。\n\"今天这个局你来主导。我跟刘老板喝两杯就走，剩下的交给你。\""}, {"type": "narr", "nid": "act4_meal", "text": "饭局中。\n\n刘老板开始吹牛。\n张设计低头猛吃。\n小张 AE 端茶递水。\n\n突然刘老板说了一句："}, {"type": "narr", "nid": "act4_meal", "text": "你瞬间明白：\n\n• 刘老板在试探你\n• 赵欣在不在场——她在公司\n• 王铁锤在旁边看着\n• 这一句话能决定你半年"}, {"type": "msg", "nid": "act4_meal", "author": "王铁锤", "text": "林舟，这边坐", "time": "19:05"}, {"type": "msg", "nid": "act4_meal", "author": "王铁锤", "text": "刘老板是我们潜在客户", "time": "19:05"}, {"type": "msg", "nid": "act4_meal", "author": "王铁锤", "text": "手里有 5 个亿的市场预算", "time": "19:06"}, {"type": "msg", "nid": "act4_meal", "author": "刘老板", "text": "小王啊，你们这小伙子看着不错", "time": "19:08"}, {"type": "msg", "nid": "act4_meal", "author": "刘老板", "text": "在你们这多久了？", "time": "19:08"}, {"type": "msg", "nid": "act4_meal", "author": "刘老板", "text": "对了小王", "time": "19:30"}, {"type": "msg", "nid": "act4_meal", "author": "刘老板", "text": "你们那个赵欣我听说过", "time": "19:30"}, {"type": "msg", "nid": "act4_meal", "author": "刘老板", "text": "能力不错", "time": "19:30"}, {"type": "msg", "nid": "act4_meal", "author": "刘老板", "text": "下周让她来跟我对接？", "time": "19:30"}, {"type": "narr", "nid": "act4_side_meal_buy", "text": "饭局尾声。\n刘老板举杯：\"王总，今天喝得不错。\"\n\n王铁锤使了个眼色给你。\n\n你知道——他要去创造和刘老板单独聊的空间。\n但\"眼色\"是什么？"}, {"type": "narr", "nid": "act4_side_meal_buy", "text": "你去前台买单。\n王铁锤在背后轻轻叹了口气。\n\n他觉得你\"没眼力\"。"}, {"type": "decision", "nid": "act4_side_meal_buy", "prompt": "王铁锤使了个眼色。\n你去——", "options": [{"text": "立刻去前台买单\n(话术+2，但老板-2)", "effect": {"speech": 2, "npc.王铁锤.trust": -2}}, {"text": "假装去洗手间，等 5 分钟回来\n(抗压+5，王铁锤+3)", "effect": {"stress": 5, "npc.王铁锤.trust": 3}}, {"text": "主动说：老板我去买包烟\n(人情+8，王铁锤+5)", "effect": {"human": 8, "npc.王铁锤.trust": 5}}]}, {"type": "narr", "nid": "act4_meal_decide", "text": "刘老板没再说啥。\n但王铁锤在回去路上找你谈话：\n\"谁让你现场答应的？\"\n\n你已经在心里打草稿：\n\"王总您放心~赵欣下次一定对接到位哈🌹\"\n你的乙里乙气 +1。\n王铁锤虽然嘴上说，但心里觉得：\n\"这小伙子挺会做人的。\" +3 信任"}, {"type": "msg", "nid": "act4_meal_decide", "author": "刘老板", "text": "行", "time": "19:31"}, {"type": "msg", "nid": "act4_meal_decide", "author": "刘老板", "text": "你回去商量", "time": "19:31"}, {"type": "decision", "nid": "act4_meal_decide", "prompt": "刘老板：\n\"下周让赵欣来跟我对接？\"\n\n王铁锤在旁边看着你。\n刘老板等着你的回答。\n\n你怎么接？", "options": [{"text": "没问题刘老板，我回去 function startGame() {
  document.getElementById('intro-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  renderNext();
}

function updateStatusBar() {
  document.getElementById('s-business').textContent = state.business;
  document.getElementById('s-speech').textContent = state.speech;
  document.getElementById('s-human').textContent = state.human;
  document.getElementById('s-stress').textContent = state.stress;
  document.getElementById('s-reputation').textContent = state.reputation;
  document.getElementById('s-yibei').textContent = state.yibei;
}

function applyEffect(effect) {
  if (!effect) return;
  for (const key in effect) {
    const val = effect[key];
    if (key.startsWith('npc.')) {
      const parts = key.split('.');
      const npcName = parts[1];
      const subKey = parts[2] || 'trust';
      if (!state.npc[npcName]) state.npc[npcName] = { trust: 0 };
      if (subKey === 'trust') {
        state.npc[npcName].trust = (state.npc[npcName].trust || 0) + val;
      }
    } else if (key === 'yibeiLevel' || key === 'yibei') {
      state.yibei += val;
    } else if (state.hasOwnProperty(key)) {
      state[key] += val;
    }
  }
}

function showItem(item) {
  const content = document.getElementById('content');
  const div = document.createElement('div');

  if (item.type === 'narr') {
    div.className = 'card scene';
    div.textContent = item.text;
  } else if (item.type === 'notif') {
    div.className = 'card notif';
    div.innerHTML = `<span class="author">${escapeHtml(item.author)}</span>${escapeHtml(item.text)}`;
  } else if (item.type === 'image') {
    div.className = 'card image';
    div.textContent = item.text;
  } else if (item.type === 'msg') {
    const isMe = item.author === '我' || item.author === '林舟' || item.author === '系统';
    div.className = `card msg ${isMe ? 'me' : 'them'}`;
    const timeStr = item.time ? `<span class="time">${item.time}</span>` : '';
    div.innerHTML = `<span class="author">${escapeHtml(item.author)}</span>${timeStr}<div class="text">${escapeHtml(item.text)}</div>`;
  } else if (item.type === 'decision') {
    div.className = 'card decision';
    let html = `<div class="prompt">${escapeHtml(item.prompt)}</div>`;
    item.options.forEach((opt, i) => {
      html += `<button class="choice" data-idx="${i}">${escapeHtml(opt.text)}</button>`;
    });
    div.innerHTML = html;
    isChoosing = true;
    div.querySelectorAll('.choice').forEach(btn => {
      btn.addEventListener('click', (e) => {
        if (!isChoosing) return;
        isChoosing = false;
        const idx = parseInt(e.target.dataset.idx);
        e.target.classList.add('chosen');
        applyEffect(item.options[idx].effect);
        const optText = item.options[idx].text;
        if (optText.includes('临场发挥')) state.flags.chose_strategy = true;
        if (optText.includes('改 PPT 结构')) state.flags.chose_revise = true;
        div.querySelectorAll('.choice').forEach(b => b.style.pointerEvents = 'none');
        updateStatusBar();
        setTimeout(() => {
          currentIndex++;
          renderNext();
        }, 500);
      });
    });
  } else if (item.type === 'ending_marker') {
    return div;
  }
  content.appendChild(div);
  setTimeout(() => {
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }, 50);
  return div;
}

function escapeHtml(s) {
  if (typeof s !== 'string') return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function computeEnding() {
  const wang = state.npc['王铁锤']?.trust || 0;
  const liu = state.npc['刘老板']?.trust || 0;
  const zhangsj = state.npc['张设计']?.trust || 0;
  const zhaoxin = state.npc['赵欣']?.trust || 0;
  const total = state.business + state.speech + state.human;

  if (state.stress >= 150) return ENDINGS[0];
  if (state.reputation < 25) return ENDINGS[1];
  if (state.yibei >= 5 && wang >= 8 && state.stress < 120) return ENDINGS[2];
  if (total >= 140 && wang >= 15 && state.stress < 100) return ENDINGS[3];
  if (state.business >= 60 && zhangsj >= 12) return ENDINGS[4];
  if (state.business >= 60 && liu >= 8) return ENDINGS[5];
  return ENDINGS[6];
}

function generateInsight(reason) {
  return `\n\n━━━ 解锁条件 ━━━\n${reason}\n\n━━━ 你的统计 ━━━\n业务 ${state.business} | 话术 ${state.speech} | 人情 ${state.human}\n抗压 ${state.stress} | 口碑 ${state.reputation} | 乙气 ${state.yibei}\n\n王铁锤信任 ${state.npc['王铁锤']?.trust || 0}\n张设计信任 ${state.npc['张设计']?.trust || 0}\n赵欣信任 ${state.npc['赵欣']?.trust || 0}\n刘老板信任 ${state.npc['刘老板']?.trust || 0}\n小张 AE 信任 ${state.npc['小张AE']?.trust || 0}\n\n【致每一个在职场打怪的你】\n这游戏里没有正确答案。\n每一个选择都有代价。\n但只要你不躺平——\n90 天后，你总会比昨天强一点。`;
}

function showEnding(endingItem) {
  const div = document.createElement('div');
  const final = computeEnding();
  div.className = 'card ending';
  div.innerHTML = `
    <h1>${final.icon} ${escapeHtml(final.title)}</h1>
    <div class="desc">${escapeHtml(final.desc)}${generateInsight(final.label)}</div>
    <div class="stats">
      <div class="stat-item">业务能力 ${state.business}</div>
      <div class="stat-item">话术技巧 ${state.speech}</div>
      <div class="stat-item">人情世故 ${state.human}</div>
      <div class="stat-item">抗压能力 ${state.stress}</div>
      <div class="stat-item">业界口碑 ${state.reputation}</div>
      <div class="stat-item">乙里乙气 ${state.yibei}</div>
    </div>
    <button class="continue" onclick="location.reload()">🔄 再来一次</button>
  `;
  return div;
}

function renderNext() {
  updateStatusBar();
  if (currentIndex >= STORY.length) {
    const endingDiv = showEnding(null);
    document.getElementById('content').appendChild(endingDiv);
    setTimeout(() => endingDiv.scrollIntoView({ behavior: 'smooth', block: 'end' }), 50);
    return;
  }

  const item = STORY[currentIndex];
  currentIndex++;
  showItem(item);
  
  if (item.type !== 'decision' && !item.type.endsWith('_marker')) {
    setTimeout(() => {
      if (!isChoosing) renderNext();
    }, 1200);
  }
}

updateStatusBar();

</script>
</body>
</html>
